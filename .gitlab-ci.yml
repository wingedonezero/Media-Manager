# sonarqube analysis
sonarqube-qa:
  stage: test
  image: tinymediamanager/reporting:latest
  only:
    variables:
      - $QA_BUILD == "true"
  tags:
    - tmm # force running on own runners
  allow_failure: true
  script:
    - mvn $MAVEN_CLI_OPTS clean verify -Pqa sonar:sonar -Dsonar.projectKey=org.tinymediamanager:tinyMediaManager -Dsonar.organization=tinymediamanager -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${SONARCLOUD_API_TOKEN}
  artifacts:
    expire_in: 1 days
    paths:
      - target/dependency-check-report.html
    reports:
      codequality:
        - target/code-quality.json


##########################################
# RELEASE
##########################################
deploy:RELEASE:
  stage: deploy
  only:
    - main@tinyMediaManager/tinyMediaManager
  when: manual
  trigger:
    include: .ci/deploy_release.yml
    strategy: depend
