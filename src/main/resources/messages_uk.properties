scraper.tmdb.hint=<html><h3>База даних фільмів (TMDB)</h3><br />Найбільша безкоштовна база даних фільмів, що підтримується спільнотою. Вона надає метадані та ілюстрації багатьма різними мовами.<br /><br />Доступні мови: Кілька.</html>
scraper.imdb.hint=<html><h3>Інтернет-база даних фільмів (IMDb)</h3><br />Найбільш використовувана база даних фільмів у всьому світі.<br />Не містить сюжету/назви/гаслона всіма мовами. Ви можете завантажити ці тексти з TMDB<br /><br />Доступні мови: Кілька</html>
scraper.ofdb.hint=<html><h3>Онлайн-банк фільмів (OFDb)</h3><br />Німецька база даних фільмів, що керується спільнотою.<br /><br />Доступні мови: німецька</html>
scraper.zelluloid.hint=<html><h3>Zelluloid.de</h3><br />Німецька база даних фільмів.<br /><br />Доступні мови: DE</html>
scraper.moviemeter.hint=<html><h3>Moviemeter.nl</h3><br />База даних голландських фільмів.<br /><br />Доступні мови: NL</html>
scraper.rottentomatoes.hint=<html><h3>Rotten Tomatoes</h3><br />Американська база даних фільмів.<br />Не надає сюжет для старіших фільмів через API.<br /><br />Доступні мови: EN</html>
scraper.imdb.filterUnwantedCategories.desc=<html>Відфільтрувати небажані категорії<br />Для фільмів: лише категорії Фільмів будуть узяти до уваги<br />Для телесеріалів: лише категорії Телесеріалів будуть узяти до уваги<br /><br />Якщо ви бажаєте шукати за іншими категоріями, відмовтесь від цієї опції</html>
scraper.imdb.scrapeCollectionInfo.desc=<html>IMDb не містить інформації про знімальні майданчики фільмів.<br />Якщо позначено, для отримання цієї інформації використовується парсер TMDB.</html>
