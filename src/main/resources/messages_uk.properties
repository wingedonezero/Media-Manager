wizard.disclaimer.long=«tinyMediaManager — це медіаменеджер, який допомагає організувати вашу медіатеку, забезпечуючи легкий доступ до сторонніх сервісів, таких як «The Movie Database (TMDB)», «TheTVDB.com», «Trakt.tv» тощо.\nСам tinyMediaManager не пропонує жодних метаданих чи завантажуваного контенту — він лише виступає посередником між вашим комп’ютером та сервісами, які пропонують такі дані.\n\ntinyMediaManager розроблено за ліцензією Apache v2 (https://www.apache.org/licenses/LICENSE-2.0) та використовує інші компоненти з відкритим кодом.\nЦей інструмент розроблено та протестовано кількома користувачами, але він все ще може містити помилки, які можуть видалити/знищити вашу медіатеку. Обов’язково завжди створюйте резервні копії своїх даних. Ми не несемо відповідальності за будь-яку втрату даних, спричинену цим інструментом!\n\nПРОГРАМНЕ ЗАБЕЗПЕЧЕННЯ НАДАЄТЬСЯ "ЯК Є", БЕЗ БУДЬ-ЯКИХ ГАРАНТІЙ, ЯВНИХ ЧИ НЕЯВНИХ, ВКЛЮЧАЮЧИ, АЛЕ НЕ ОБМЕЖУЮЧИСЬ, ГАРАНТІЯМИ ТОВАРНОЇ ПРИДАТНОСТІ, ПРИДАТНОСТІ ДЛЯ ПЕВНОЇ МЕТИ ТА НЕПОРУШЕННЯ ПРАВ. НІ В ЯКОМУ У РАЗІ ТОГО, АВТОРИ АБО ВЛАСНИКИ АВТОРСЬКИХ ПРАВ НЕ НЕСУТЬ ВІДПОВІДАЛЬНОСТІ ЗА БУДЬ-ЯКІ ПРЕТЕНЗІЇ, ЗБИТКИ АБО ІНШУ ВІДПОВІДАЛЬНІСТЬ, ЧИ ТО ВИНИКЛИ В ВИНІ ДІЇ ЗА ДОГОВОРОМ, ДЕЛІКТУ ЧИ ІНШИМ ЧИНОМ, ЩО ВИНИКЛИ В ЗВ'ЯЗКУ З ПРОГРАМНИМ ЗАБЕЗПЕЧЕННЯМ АБО ВИКОРИСТАННЯМ ЧИ ІНШИМИ ДІЯМИ З ПРОГРАМНИМ ЗАБЕЗПЕЧЕННЯМ.
