scraper.omdbapi.hint=<html><h3>Omdbapi.com</h3><br />OMDb API — це RESTful веб-сервіс для отримання інформації про фільми. Весь контент і зображення на сайті надаються та підтримуються нашими користувачами. <br /><br />TinyMediaManager пропонує обмежений доступ до OMDb (10 викликів за 15 секунд). Якщо ви хочете використовувати OMDb з більшим, ніж цей обмежений доступ, вам слід стати учасником OMDb (https://www.patreon.com/join/omdb).<br /><br />Доступні мови: EN</html>
scraper.trakt.hint=<html><h3>Trakt.tv</h3><br />Trakt.tv — це платформа, яка виконує багато функцій, але в основному відстежує телешоу та фільми, які ви переглядаєте. Вона також надає метадані для фільмів та телешоу.<br /><br />Доступні мови: EN</html>
scraper.universal_movie.hint=<html><h3>Універсальний скрепер фільмів</h3><br />Метаскрепер, який дозволяє збирати та об'єднувати дані з інших скреперів.<br /><br />Щоб цей скрепер працював, вам потрібно вказати <b>принаймні</b>, який скрепер слід використовувати для пошуку. Після цього ви можете вибрати, який скрепер слід використовувати для кожного підтримуваного поля метаданих. <b>Вам потрібно налаштувати всі використані скрепери окремо.</b></html>
scraper.universal_tvshow.hint=<html><h3>Universal TV show scraper</h3><br />Мета-скрепер, який дозволяє збирати та об’єднувати дані з інших скреперів.<br /><br />Щоб цей скрепер працював, вам потрібно вказати <b>принаймні</b>, який скрепер слід використовувати для пошуку. Після цього ви можете вибрати, який скрепер слід використовувати для кожного підтримуваного поля метаданих. <b>Вам потрібно налаштувати всі використані скрепери окремо.</b></html>
scraper.mpdbtv.hint=<html><h3>MPDb.TV</h3><br />MPDb.TV – це приватний постачальник метаданих для франкомовних користувачів. Вам може знадобитися зареєструватися, щоб скористатися цією послугою (більше інформації на http://www.mpdb.tv/)<br /><br />Доступні мови: FR</html>
scraper.anidb.hint=<html><h3>aniDB</h3><br />AniDB розшифровується як Anime DataBase (База Даних Аніме). AniDB — це некомерційна база даних аніме, відкрита для громадськості.</html>
scraper.tvdb.hint=<html><h3>TheTVDB</h3><br />Відкрита база даних для телешоуменів. Цей парсер здатний парсити метадані та ілюстрації телесеріалів</html>
scraper.animated.hint=<html><h3>Анімаційні кінопостери</h3><br />як видно на http://forum.kodi.tv/showthread.php?tid=215727 :)</html>
scraper.fanarttv.hint=<html><h3>Fanart.tv</h3><br />Fanart.tv пропонує величезну бібліотеку ілюстрацій для фільмів, телешоу та музики. Цим сервісом можна користуватися за допомогою ключа API, який пропонує tinyMediaManager, але якщо ви хочете мати швидший доступ до ілюстрацій, вам слід стати VIP-учасником на fanart.tv (https://fanart.tv/vip/).</html>
scraper.fanarttv.clientKey=Персональний ключ API
scraper.hd-trailers.hint=<html><h3>hd-trailers.net</h3>Скрейпер для hd-trailers.net, який може скребти дані з причепів</html>
