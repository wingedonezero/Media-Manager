stages:
  - deploy

variables:
  IMAGE_NAME: tinymediamanager/tinymediamanager
  TMM_DOCKER_VERSION: "5.2.9"
  TMM_DOCKER_ARCHIVE_BASE_URL: "https://release.tinymediamanager.org/v5/dist"
  TMM_DOCKER_PUSH_LATEST: "true"

.deploy-docker-remote-validate:
  before_script:
    - '[ -n "$TMM_DOCKER_VERSION" ] || { echo "TMM_DOCKER_VERSION is required"; exit 1; }'
    - '[ -n "$TMM_DOCKER_ARCHIVE_BASE_URL" ] || { echo "TMM_DOCKER_ARCHIVE_BASE_URL is required"; exit 1; }'

deploy-docker-amd64:
  stage: deploy
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [ "" ]
  extends: .deploy-docker-remote-validate
  dependencies: [ ]  # do not download any artifacts
  tags:
    - tmm # force running on own runners
  script:
    # create login credentials
    - echo -e $DOCKERHUB_AUTH > /kaniko/.docker/config.json

    # download data
    - mkdir -p /tmp/tmm-download target/docker
    - AMD64_URL="${TMM_DOCKER_AMD64_URL:-${TMM_DOCKER_ARCHIVE_BASE_URL}/tinyMediaManager-${TMM_DOCKER_VERSION}-linux-amd64.tar.xz}"
    - /busybox/wget -q -O /tmp/tmm-download/tinyMediaManager-linux-amd64.tar.xz "$AMD64_URL"
    - tar xJf /tmp/tmm-download/tinyMediaManager-linux-amd64.tar.xz -C target/docker/

    # build image
    - |
      /kaniko/executor \
      --context "${CI_PROJECT_DIR}/target/docker" \
      --dockerfile "${CI_PROJECT_DIR}/src/docker/Dockerfile.amd64" \
      --custom-platform=linux/amd64/ \
      --destination "${IMAGE_NAME}:${TMM_DOCKER_VERSION}-amd64"

deploy-docker-arm64:
  stage: deploy
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [ "" ]
  extends: .deploy-docker-remote-validate
  dependencies: [ ]  # do not download any artifacts
  tags:
    - tmm-arm64 # force running on own runners
  script:
    # create login credentials
    - echo -e $DOCKERHUB_AUTH > /kaniko/.docker/config.json

    # download data
    - mkdir -p /tmp/tmm-download target/docker
    - ARM64_URL="${TMM_DOCKER_ARM64_URL:-${TMM_DOCKER_ARCHIVE_BASE_URL}/tinyMediaManager-${TMM_DOCKER_VERSION}-linux-arm64.tar.xz}"
    - /busybox/wget -q -O /tmp/tmm-download/tinyMediaManager-linux-arm64.tar.xz "$ARM64_URL"
    - tar xJf /tmp/tmm-download/tinyMediaManager-linux-arm64.tar.xz -C target/docker/
    - cd target/docker
    - mv tinyMediaManager/tinyMediaManager-arm tinyMediaManager/tinyMediaManager

    # build image
    - |
      /kaniko/executor \
      --context "${CI_PROJECT_DIR}/target/docker" \
      --dockerfile "${CI_PROJECT_DIR}/src/docker/Dockerfile.arm64" \
      --custom-platform=linux/arm64/ \
      --destination "${IMAGE_NAME}:${TMM_DOCKER_VERSION}-arm64"

deploy-docker:
  stage: deploy
  image:
    name: curlimages/curl:8.1.1
  extends: .deploy-docker-remote-validate
  needs:
    - deploy-docker-amd64
    - deploy-docker-arm64
  dependencies: [ ]  # do not download any artifacts
  tags:
    - tmm # force running on own runners
  script:
    - cd /tmp
    - curl -s -L https://github.com/estesp/manifest-tool/releases/download/v2.0.8/binaries-manifest-tool-2.0.8.tar.gz | tar xvz
    - mv manifest-tool-linux-amd64 manifest-tool
    - chmod +x manifest-tool

    # create the manifest for multiarch tag
    - ./manifest-tool --username $DOCKERHUB_USERNAME --password $DOCKERHUB_PASSWORD push from-args
      --platforms linux/amd64,linux/arm64
      --template ${IMAGE_NAME}:${TMM_DOCKER_VERSION}-ARCH
      --target ${IMAGE_NAME}:${TMM_DOCKER_VERSION}

    # optionally update latest tag too
    - |
      if [ "$TMM_DOCKER_PUSH_LATEST" = "true" ]; then
        ./manifest-tool --username $DOCKERHUB_USERNAME --password $DOCKERHUB_PASSWORD push from-args \
        --platforms linux/amd64,linux/arm64 \
        --template ${IMAGE_NAME}:${TMM_DOCKER_VERSION}-ARCH \
        --target ${IMAGE_NAME}:latest
      fi
